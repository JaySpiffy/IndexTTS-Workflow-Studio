<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndexTTS2 - Debug Test</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/forms.css">
    <link rel="stylesheet" href="assets/css/workflows.css">
    <link rel="stylesheet" href="assets/css/batch-processing.css">
    <link rel="stylesheet" href="assets/css/line-editor.css">
    <link rel="stylesheet" href="assets/css/edit-segment-modal.css">
    <link rel="stylesheet" href="assets/css/keyboard-shortcuts.css">
    <link rel="stylesheet" href="assets/css/emotion-timeline.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            z-index: 9999;
            max-width: 300px;
        }
        .debug-log {
            max-height: 200px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #ddd;
            padding: 5px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
        }
        .debug-log div {
            margin-bottom: 2px;
        }
        .error { color: red; }
        .success { color: green; }
        .info { color: blue; }
    </style>
</head>
<body>
    <div class="debug-panel">
        <h4>Debug Panel</h4>
        <button id="clear-debug" class="btn btn-secondary btn-small">Clear Log</button>
        <div id="debug-log" class="debug-log"></div>
    </div>

    <header>
        <div class="container">
            <h1>IndexTTS2 - Debug Test</h1>
            <div id="api-status" class="api-status">
                <span class="status-dot"></span>
                <span class="status-text">Checking API...</span>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- Tab Navigation -->
            <div class="tab-navigation">
                <button class="tab-button active" data-tab="conversation-workflow">
                    <i class="fas fa-comments"></i> Conversation Workflow
                </button>
                <button class="tab-button" data-tab="conversation-results">
                    <i class="fas fa-list"></i> Results
                </button>
            </div>

            <!-- Tab Content -->
            <div class="tab-content">
                <!-- Conversation Workflow Tab -->
                <div id="conversation-workflow" class="tab-pane active">
                    <div class="workflow-section">
                        <h2>Conversation Script</h2>
                        <div class="form-group">
                            <label for="conversation-title">Conversation Title</label>
                            <input type="text" id="conversation-title" placeholder="Enter conversation title...">
                        </div>
                        <div class="form-group">
                            <label for="conversation-script">Script</label>
                            <textarea id="conversation-script" rows="8" placeholder="Enter conversation script, one line per speaker:
Narrator: The city was quiet...
John: I can't believe it's over.
Sarah: (Surprised) You're here! I thought you were...">Narrator: The city was quiet...
John: I can't believe it's over.
Sarah: (Surprised) You're here! I thought you were...</textarea>
                        </div>
                        <div class="form-actions">
                            <button id="parse-script-btn" class="btn btn-primary">
                                <i class="fas fa-check"></i> Parse Script
                            </button>
                            <button id="clear-script-btn" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Clear
                            </button>
                        </div>
                        <div id="script-preview" style="display: none;">
                            <h3>Script Preview</h3>
                            <div id="preview-content"></div>
                        </div>
                    </div>

                    <div class="workflow-section">
                        <h2>Generation Settings</h2>
                        <div class="form-group">
                            <label for="versions-per-line">Versions per line</label>
                            <input type="number" id="versions-per-line" value="3" min="1" max="5">
                        </div>
                        <div class="form-group">
                            <label for="emotion-control-method">Emotion Control Method</label>
                            <select id="emotion-control-method">
                                <option value="from_speaker">From Speaker</option>
                                <option value="from_vectors">From Vectors</option>
                                <option value="from_text">From Text</option>
                                <option value="from_reference">From Reference</option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button id="generate-conversation-btn" class="btn btn-primary">
                                <i class="fas fa-play"></i> Generate Conversation
                            </button>
                            <button id="stop-generation-btn" class="btn btn-secondary" style="display: none;">
                                <i class="fas fa-stop"></i> Stop
                            </button>
                        </div>
                        <div id="generation-progress" style="display: none;">
                            <div class="progress-bar">
                                <div class="progress-fill"></div>
                            </div>
                            <div class="progress-text">Starting...</div>
                            <div class="progress-percent">0%</div>
                            <div id="generation-logs" class="generation-logs"></div>
                        </div>
                        <div id="generation-result" style="display: none;"></div>
                    </div>
                </div>

                <!-- Conversation Results Tab -->
                <div id="conversation-results" class="tab-pane">
                    <div class="results-section">
                        <h2>Conversation Results</h2>
                        <div id="conversations-list">
                            <div class="empty-state">
                                <i class="fas fa-comments"></i>
                                <p>No conversations found. Generate a conversation first.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Notification Container -->
    <div id="notification-container"></div>

    <!-- Audio Player Modal -->
    <div id="audio-player-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Audio Player</h3>
                <button id="close-audio-player" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Close
                </button>
            </div>
            <div class="modal-body">
                <div id="customMediaPlayer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        // Mock IndexTTSApp for debugging
        class IndexTTSApp {
            constructor() {
                this.apiBaseUrl = window.location.origin + '/api';
                this.currentConversationId = null;
                this.currentTab = 'conversation-workflow';
                this.speakers = [
                    { filename: 'narrator.wav', name: 'Narrator' },
                    { filename: 'john.wav', name: 'John' },
                    { filename: 'sarah.wav', name: 'Sarah' }
                ];
                this.conversations = [];
                this.generationInterval = null;
                this.isDarkMode = false;
                this.customMediaPlayer = null;
                this.conversationScript = [];
                this.parsedScript = null;
                
                this.init();
            }

            init() {
                this.debugLog('App initialized', 'info');
                this.setupEventListeners();
                this.checkApiStatus();
                this.setupDarkMode();
            }

            debugLog(message, type = 'info') {
                const logDiv = document.getElementById('debug-log');
                const entry = document.createElement('div');
                entry.className = type;
                entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                logDiv.appendChild(entry);
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            setupEventListeners() {
                this.debugLog('Setting up event listeners', 'info');
                
                // Tab navigation
                document.querySelectorAll('.tab-button').forEach(button => {
                    button.addEventListener('click', (e) => {
                        this.debugLog(`Tab clicked: ${e.target.closest('.tab-button').dataset.tab}`, 'info');
                        this.switchTab(e.target.closest('.tab-button').dataset.tab);
                    });
                });

                // Conversation Workflow
                this.setupConversationWorkflowEvents();
            }

            setupConversationWorkflowEvents() {
                this.debugLog('Setting up conversation workflow events', 'info');
                
                // Parse script button
                const parseBtn = document.getElementById('parse-script-btn');
                if (parseBtn) {
                    parseBtn.addEventListener('click', () => {
                        this.debugLog('Parse script button clicked', 'info');
                        this.parseScript();
                    });
                } else {
                    this.debugLog('Parse script button not found!', 'error');
                }

                // Clear script button
                const clearBtn = document.getElementById('clear-script-btn');
                if (clearBtn) {
                    clearBtn.addEventListener('click', () => {
                        this.debugLog('Clear script button clicked', 'info');
                        document.getElementById('conversation-script').value = '';
                        document.getElementById('script-preview').style.display = 'none';
                    });
                }

                // Generate conversation button
                const generateBtn = document.getElementById('generate-conversation-btn');
                if (generateBtn) {
                    generateBtn.addEventListener('click', () => {
                        this.debugLog('Generate conversation button clicked', 'info');
                        this.generateConversation();
                    });
                } else {
                    this.debugLog('Generate conversation button not found!', 'error');
                }
            }

            parseScript() {
                this.debugLog('parseScript() called', 'info');
                
                const scriptText = document.getElementById('conversation-script').value.trim();
                
                if (!scriptText) {
                    this.showNotification('Error', 'Please enter a conversation script', 'error');
                    return;
                }
                
                this.debugLog(`Parsing script: ${scriptText}`, 'info');
                
                // Parse script lines
                const lines = [];
                const scriptLines = scriptText.split('\n').filter(line => line.trim());
                
                for (let i = 0; i < scriptLines.length; i++) {
                    const line = scriptLines[i].trim();
                    const match = line.match(/^([^:]+):\s*(.+)$/);
                    
                    if (match) {
                        const speaker = match[1].trim();
                        const text = match[2].trim();
                        
                        // Simple speaker matching for test
                        let matchedSpeaker = this.speakers.find(s => 
                            s.name.toLowerCase() === speaker.toLowerCase() ||
                            s.filename.toLowerCase().replace('.wav', '') === speaker.toLowerCase()
                        );
                        
                        if (!matchedSpeaker) {
                            // Create a mock speaker if not found
                            matchedSpeaker = { filename: `${speaker}.wav`, name: speaker };
                        }
                        
                        // Create line object with default emotion vector (calm)
                        lines.push({
                            line: lines.length + 1,
                            speaker: matchedSpeaker.name,
                            speaker_filename: matchedSpeaker.filename,
                            text: text,
                            line_number: i,
                            emo_vector: [0, 0, 0, 0, 0, 0, 0, 0.8] // Default to 'calm' emotion
                        });
                    } else {
                        this.showNotification('Error', `Invalid line format: ${line}`, 'error');
                        return;
                    }
                }
                
                if (lines.length === 0) {
                    this.showNotification('Error', 'No valid conversation lines found', 'error');
                    return;
                }
                
                // Store conversation script with emotion vectors
                this.conversationScript = lines;
                
                // Generate timeline
                this.generateTimeline();
                
                // Show preview
                const previewContent = document.getElementById('preview-content');
                previewContent.innerHTML = '';
                
                lines.forEach((line, index) => {
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'preview-line';
                    lineDiv.innerHTML = `
                        <strong>Line ${index + 1}:</strong>
                        <span class="speaker-name">${line.speaker}</span>:
                        "${line.text}"
                    `;
                    previewContent.appendChild(lineDiv);
                });
                
                document.getElementById('script-preview').style.display = 'block';
                
                // Store parsed script for generation
                this.parsedScript = {
                    title: document.getElementById('conversation-title').value.trim() || 'Untitled Conversation',
                    lines: lines
                };
                
                this.showNotification('Success', `Parsed ${lines.length} conversation lines`, 'success');
                this.debugLog(`Successfully parsed ${lines.length} lines`, 'success');
            }

            generateTimeline() {
                this.debugLog('generateTimeline() called', 'info');
                
                if (!this.conversationScript || this.conversationScript.length === 0) {
                    this.debugLog('No conversation script to generate timeline', 'error');
                    return;
                }
                
                this.debugLog(`Generating timeline for ${this.conversationScript.length} lines`, 'info');
                
                // Create timeline container if it doesn't exist
                let timelineContainer = document.getElementById('emotion-timeline-container');
                if (!timelineContainer) {
                    timelineContainer = document.createElement('div');
                    timelineContainer.id = 'emotion-timeline-container';
                    timelineContainer.className = 'emotion-timeline-container';
                    
                    // Insert after script preview
                    const scriptPreview = document.getElementById('script-preview');
                    scriptPreview.parentNode.insertBefore(timelineContainer, scriptPreview.nextSibling);
                }
                
                timelineContainer.innerHTML = `
                    <div class="emotion-timeline-header">
                        <h3><i class="fas fa-chart-line"></i> Emotion Timeline</h3>
                        <p>Click on any line to adjust emotions for that specific part of the conversation</p>
                    </div>
                    <div class="emotion-timeline-content">
                        <!-- Timeline blocks will be generated here -->
                    </div>
                `;
                
                // Generate timeline blocks
                const timelineContent = timelineContainer.querySelector('.emotion-timeline-content');
                timelineContent.innerHTML = '';
                
                this.conversationScript.forEach((line, index) => {
                    const timelineBlock = document.createElement('div');
                    timelineBlock.className = 'timeline-block';
                    timelineBlock.style.cursor = 'pointer';
                    timelineBlock.style.padding = '10px';
                    timelineBlock.style.margin = '5px 0';
                    timelineBlock.style.border = '1px solid #ccc';
                    timelineBlock.style.borderRadius = '5px';
                    
                    timelineBlock.innerHTML = `
                        <div style="font-weight: bold;">Line ${index + 1}: ${line.speaker}</div>
                        <div style="font-style: italic;">"${line.text}"</div>
                        <div style="height: 8px; background: linear-gradient(to right, #FFD700, #0000FF, #FF0000, #FFC0CB, #90EE90); border-radius: 4px; margin-top: 5px;"></div>
                    `;
                    
                    // Add click event listener
                    timelineBlock.addEventListener('click', () => {
                        this.debugLog(`Timeline line ${index + 1} clicked`, 'info');
                        alert(`Emotion control for line ${index + 1}: ${line.speaker}`);
                    });
                    
                    timelineContent.appendChild(timelineBlock);
                });
                
                this.debugLog('Timeline generated successfully', 'success');
            }

            generateConversation() {
                this.debugLog('generateConversation() called', 'info');
                
                if (!this.parsedScript) {
                    this.showNotification('Error', 'Please parse a script first', 'error');
                    return;
                }
                
                this.debugLog('Starting mock conversation generation', 'info');
                
                // Mock generation process
                const progressContainer = document.getElementById('generation-progress');
                const resultContainer = document.getElementById('generation-result');
                const button = document.getElementById('generate-conversation-btn');
                const progressFill = progressContainer.querySelector('.progress-fill');
                const progressText = progressContainer.querySelector('.progress-text');
                const progressPercent = progressContainer.querySelector('.progress-percent');
                const logsContainer = document.getElementById('generation-logs');
                
                // Show progress
                progressContainer.style.display = 'block';
                resultContainer.style.display = 'none';
                button.disabled = true;
                logsContainer.innerHTML = '';
                
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    progressFill.style.width = `${progress}%`;
                    progressText.textContent = `Generating line ${Math.floor(progress / 25) + 1}...`;
                    progressPercent.textContent = `${progress}%`;
                    
                    const logEntry = document.createElement('div');
                    logEntry.textContent = `[${new Date().toLocaleTimeString()}] Generating line ${Math.floor(progress / 25) + 1}...`;
                    logsContainer.appendChild(logEntry);
                    logsContainer.scrollTop = logsContainer.scrollHeight;
                    
                    if (progress >= 100) {
                        clearInterval(interval);
                        
                        resultContainer.innerHTML = `
                            <h4>Generation Complete!</h4>
                            <p>Conversation generated successfully. Check the Results tab to see the output.</p>
                        `;
                        resultContainer.style.display = 'block';
                        button.disabled = false;
                        
                        this.showNotification('Success', 'Conversation generation completed!', 'success');
                        this.debugLog('Mock generation completed', 'success');
                    }
                }, 500);
            }

            switchTab(tabName) {
                this.debugLog(`Switching to tab: ${tabName}`, 'info');
                
                // Update tab buttons
                document.querySelectorAll('.tab-button').forEach(button => {
                    button.classList.remove('active');
                });
                document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

                // Update tab panes
                document.querySelectorAll('.tab-pane').forEach(pane => {
                    pane.classList.remove('active');
                });
                document.getElementById(tabName).classList.add('active');

                this.currentTab = tabName;
            }

            checkApiStatus() {
                this.debugLog('Checking API status', 'info');
                // Mock API check
                setTimeout(() => {
                    this.updateApiStatus(true, 'API Connected (Mock)');
                }, 1000);
            }

            updateApiStatus(connected, message) {
                const statusIndicator = document.getElementById('api-status');
                const statusDot = statusIndicator.querySelector('.status-dot');
                const statusText = statusIndicator.querySelector('.status-text');

                if (connected) {
                    statusDot.classList.add('connected');
                    statusDot.classList.remove('error');
                    statusText.textContent = message;
                } else {
                    statusDot.classList.remove('connected');
                    statusDot.classList.add('error');
                    statusText.textContent = message;
                }
            }

            setupDarkMode() {
                // Mock dark mode setup
                this.debugLog('Dark mode setup', 'info');
            }

            showNotification(title, message, type = 'info') {
                this.debugLog(`Notification: ${title} - ${message} (${type})`, type === 'error' ? 'error' : 'info');
                
                const container = document.getElementById('notification-container');
                
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: ${type === 'error' ? '#f8d7da' : type === 'success' ? '#d4edda' : '#d1ecf1'};
                    color: ${type === 'error' ? '#721c24' : type === 'success' ? '#155724' : '#0c5460'};
                    padding: 15px;
                    border-radius: 5px;
                    border: 1px solid ${type === 'error' ? '#f5c6cb' : type === 'success' ? '#c3e6cb' : '#bee5eb'};
                    z-index: 1000;
                    max-width: 300px;
                `;
                
                const iconMap = {
                    'success': '✓',
                    'error': '✗',
                    'warning': '⚠',
                    'info': 'ℹ'
                };
                
                notification.innerHTML = `
                    <div style="font-weight: bold;">${iconMap[type]} ${title}</div>
                    <div>${message}</div>
                `;
                
                container.appendChild(notification);
                
                // Auto-remove after 5 seconds
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 5000);
            }
        }

        // Initialize the app when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            window.app = new IndexTTSApp();
            
            // Clear debug log button
            document.getElementById('clear-debug').addEventListener('click', () => {
                document.getElementById('debug-log').innerHTML = '';
            });
        });
    </script>
</body>
</html>
