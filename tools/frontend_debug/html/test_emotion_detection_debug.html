<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection Debug Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            margin-top: 10px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 3px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Emotion Detection Debug Test</h1>
    
    <div class="test-section">
        <h2>Test 1: Single Text Emotion Detection</h2>
        <textarea id="single-text" placeholder="Enter text to test...">I am so happy and excited today!</textarea>
        <button onclick="testSingleDetection()">Test Single Detection</button>
        <div id="single-result" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Batch Emotion Detection (Correct Format)</h2>
        <textarea id="batch-text" placeholder="Enter multiple lines...">I am so happy and excited today!
I feel very sad about what happened.
This makes me angry and frustrated.</textarea>
        <button onclick="testBatchDetection()">Test Batch Detection</button>
        <div id="batch-result" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 3: Batch Emotion Detection (Incorrect Format - camelCase)</h2>
        <button onclick="testBatchDetectionWrongFormat()">Test Wrong Format</button>
        <div id="batch-wrong-result" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 4: Empty Text Handling</h2>
        <button onclick="testEmptyText()">Test Empty Text</button>
        <div id="empty-result" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 5: Missing Required Fields</h2>
        <button onclick="testMissingFields()">Test Missing Fields</button>
        <div id="missing-fields-result" class="test-result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        
        function logResult(elementId, message, data = null, isError = false) {
            const element = document.getElementById(elementId);
            const timestamp = new Date().toISOString();
            let output = `[${timestamp}] ${message}\n`;
            
            if (data) {
                output += `Response Data:\n${JSON.stringify(data, null, 2)}\n`;
            }
            
            element.textContent = output;
            element.className = `test-result ${isError ? 'error' : 'success'}`;
        }
        
        async function makeRequest(endpoint, body, description) {
            try {
                console.log(`🔍 ${description} - Request:`, body);
                
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                console.log(`🔍 ${description} - Response:`, data);
                console.log(`🔍 ${description} - Status:`, response.status);
                
                return { response, data };
            } catch (error) {
                console.error(`❌ ${description} - Network Error:`, error);
                throw error;
            }
        }
        
        async function testSingleDetection() {
            const text = document.getElementById('single-text').value.trim();
            
            try {
                const { response, data } = await makeRequest('/emotion-detection/detect', {
                    text: text
                }, 'Single Detection');
                
                if (response.ok) {
                    logResult('single-result', '✅ Single detection successful', data);
                } else {
                    logResult('single-result', `❌ Single detection failed (${response.status})`, data, true);
                }
            } catch (error) {
                logResult('single-result', `❌ Single detection network error: ${error.message}`, null, true);
            }
        }
        
        async function testBatchDetection() {
            const batchText = document.getElementById('batch-text').value.trim();
            const texts = batchText.split('\n').filter(line => line.trim());
            
            try {
                // Test correct format with snake_case
                const { response, data } = await makeRequest('/emotion-detection/detect', {
                    text: texts[0], // First text as main text
                    batch_texts: texts.slice(1) // Remaining texts as batch
                }, 'Batch Detection (Correct Format)');
                
                if (response.ok) {
                    logResult('batch-result', '✅ Batch detection successful', data);
                } else {
                    logResult('batch-result', `❌ Batch detection failed (${response.status})`, data, true);
                }
            } catch (error) {
                logResult('batch-result', `❌ Batch detection network error: ${error.message}`, null, true);
            }
        }
        
        async function testBatchDetectionWrongFormat() {
            const texts = [
                "I am so happy and excited today!",
                "I feel very sad about what happened.",
                "This makes me angry and frustrated."
            ];
            
            try {
                // Test incorrect format with camelCase (what frontend might be sending)
                const { response, data } = await makeRequest('/emotion-detection/detect', {
                    text: texts[0],
                    batchTexts: texts.slice(1) // camelCase instead of snake_case
                }, 'Batch Detection (Wrong Format)');
                
                if (response.ok) {
                    logResult('batch-wrong-result', '✅ Wrong format worked (unexpected)', data);
                } else {
                    logResult('batch-wrong-result', `❌ Wrong format failed (${response.status}) - This confirms the issue`, data, true);
                }
            } catch (error) {
                logResult('batch-wrong-result', `❌ Wrong format network error: ${error.message}`, null, true);
            }
        }
        
        async function testEmptyText() {
            try {
                const { response, data } = await makeRequest('/emotion-detection/detect', {
                    text: '',
                    batch_texts: ['', '   ', 'valid text']
                }, 'Empty Text Test');
                
                if (response.ok) {
                    logResult('empty-result', '✅ Empty text handled correctly', data);
                } else {
                    logResult('empty-result', `❌ Empty text failed (${response.status})`, data, true);
                }
            } catch (error) {
                logResult('empty-result', `❌ Empty text network error: ${error.message}`, null, true);
            }
        }
        
        async function testMissingFields() {
            try {
                // Test with missing required 'text' field
                const { response, data } = await makeRequest('/emotion-detection/detect', {
                    batch_texts: ["some text"]
                }, 'Missing Text Field');
                
                if (response.ok) {
                    logResult('missing-fields-result', '✅ Missing text field worked (unexpected)', data);
                } else {
                    logResult('missing-fields-result', `❌ Missing text field failed (${response.status}) - This confirms validation`, data, true);
                }
            } catch (error) {
                logResult('missing-fields-result', `❌ Missing fields network error: ${error.message}`, null, true);
            }
        }
        
        // Run all tests automatically
        window.addEventListener('load', () => {
            console.log('🧪 Emotion Detection Debug Test Loaded');
            console.log('📝 Available tests:');
            console.log('  - testSingleDetection()');
            console.log('  - testBatchDetection()');
            console.log('  - testBatchDetectionWrongFormat()');
            console.log('  - testEmptyText()');
            console.log('  - testMissingFields()');
        });
    </script>
</body>
</html>
