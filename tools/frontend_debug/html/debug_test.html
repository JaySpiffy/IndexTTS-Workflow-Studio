<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndexTTS2 Debug Test</title>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/forms.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/workflows.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .debug-log {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 400px;
            height: 300px;
            background: #1a1a1a;
            color: #00ff00;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            overflow-y: auto;
            z-index: 9999;
            border: 1px solid #333;
        }
        .debug-log .error {
            color: #ff6b6b;
        }
        .debug-log .success {
            color: #51cf66;
        }
        .debug-log .warning {
            color: #ffd43b;
        }
        .debug-log .info {
            color: #74c0fc;
        }
        .debug-controls {
            position: fixed;
            top: 320px;
            right: 10px;
            z-index: 9999;
        }
        .debug-controls button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 5px 10px;
            margin: 2px;
            cursor: pointer;
        }
        .debug-controls button:hover {
            background: #555;
        }
        .tab-navigation {
            margin-bottom: 20px;
        }
        .tab-button {
            padding: 10px 20px;
            margin-right: 5px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .tab-button.active {
            background: #007bff;
            color: white;
        }
        .tab-pane {
            display: none;
            padding: 20px;
            border: 1px solid #ccc;
        }
        .tab-pane.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="debug-log" id="debug-log"></div>
    <div class="debug-controls">
        <button onclick="clearDebugLog()">Clear Log</button>
        <button onclick="testTabSwitching()">Test Tab Switching</button>
        <button onclick="testAppInitialization()">Test App Init</button>
        <button onclick="testModuleLoading()">Test Modules</button>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-microphone-alt"></i>
                    <h1>IndexTTS2 Debug</h1>
                </div>
                <div class="header-status">
                    <div class="status-indicator" id="api-status">
                        <span class="status-dot"></span>
                        <span class="status-text">Debug Mode</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <nav class="tab-navigation">
                <button class="tab-button active" data-tab="conversation-workflow">
                    <i class="fas fa-comments"></i>
                    <span>Conversation Workflow</span>
                </button>
                <button class="tab-button" data-tab="conversation-results">
                    <i class="fas fa-file-audio"></i>
                    <span>Conversation Results</span>
                </button>
            </nav>

            <div class="tab-content">
                <div class="tab-pane active" id="conversation-workflow">
                    <h2>Conversation Workflow</h2>
                    <div class="form-group">
                        <label for="conversation-script">Script:</label>
                        <textarea id="conversation-script" rows="5" placeholder="speaker_name: Dialogue text here"></textarea>
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-secondary" id="parse-script-btn">
                            <i class="fas fa-check"></i> Parse Script
                        </button>
                        <button class="btn btn-primary" id="generate-conversation-btn">
                            <i class="fas fa-play"></i> Generate Conversation
                        </button>
                    </div>
                </div>

                <div class="tab-pane" id="conversation-results">
                    <h2>Conversation Results</h2>
                    <p>Results will appear here</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Debug logging function
        function debugLog(message, type = 'info') {
            const logElement = document.getElementById('debug-log');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = type;
            logEntry.textContent = `[${timestamp}] ${message}`;
            logElement.appendChild(logEntry);
            logElement.scrollTop = logElement.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function clearDebugLog() {
            document.getElementById('debug-log').innerHTML = '';
        }

        function testTabSwitching() {
            debugLog('Testing tab switching...', 'info');
            const tabButtons = document.querySelectorAll('.tab-button');
            debugLog(`Found ${tabButtons.length} tab buttons`, 'info');
            
            if (window.app && window.app.switchTab) {
                debugLog('App.switchTab method exists', 'success');
                try {
                    window.app.switchTab('conversation-results');
                    debugLog('Tab switching executed successfully', 'success');
                } catch (error) {
                    debugLog(`Tab switching error: ${error.message}`, 'error');
                }
            } else {
                debugLog('App.switchTab method does not exist', 'error');
            }
        }

        function testAppInitialization() {
            debugLog('Testing app initialization...', 'info');
            if (window.app) {
                debugLog('App object exists', 'success');
                debugLog(`App type: ${typeof window.app}`, 'info');
                debugLog(`App constructor: ${window.app.constructor.name}`, 'info');
                
                // Test key methods
                const methods = ['switchTab', 'parseScript', 'generateConversation', 'showNotification'];
                methods.forEach(method => {
                    if (typeof window.app[method] === 'function') {
                        debugLog(`Method ${method} exists`, 'success');
                    } else {
                        debugLog(`Method ${method} missing`, 'error');
                    }
                });
            } else {
                debugLog('App object does not exist', 'error');
            }
        }

        function testModuleLoading() {
            debugLog('Testing module loading...', 'info');
            const modules = [
                'core.js',
                'eventListeners.js',
                'api.js',
                'conversationWorkflow.js',
                'conversationResults.js',
                'uiUtils.js'
            ];
            
            modules.forEach(module => {
                const scriptElement = document.querySelector(`script[src*="${module}"]`);
                if (scriptElement) {
                    debugLog(`Module ${module} loaded`, 'success');
                } else {
                    debugLog(`Module ${module} not found`, 'error');
                }
            });
        }

        // Enhanced DOM ready check
        document.addEventListener('DOMContentLoaded', function() {
            debugLog('DOM Content Loaded event fired', 'success');
            
            // Check if all required elements exist
            const requiredElements = [
                'conversation-workflow',
                'conversation-results',
                'parse-script-btn',
                'generate-conversation-btn'
            ];
            
            requiredElements.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    debugLog(`Element ${id} found`, 'success');
                } else {
                    debugLog(`Element ${id} missing`, 'error');
                }
            });
        });

        // Log window load event
        window.addEventListener('load', function() {
            debugLog('Window load event fired', 'success');
        });

        // Log errors
        window.addEventListener('error', function(event) {
            debugLog(`JavaScript Error: ${event.error.message} at ${event.filename}:${event.lineno}`, 'error');
        });

        // Log unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
            debugLog(`Unhandled Promise Rejection: ${event.reason}`, 'error');
        });
    </script>

    <!-- JavaScript Modules -->
    <script type="module">
        debugLog('Starting module loading...', 'info');
        
        try {
            import('./src/modules/core.js').then(() => {
                debugLog('Core module loaded successfully', 'success');
            }).catch(error => {
                debugLog(`Core module loading failed: ${error.message}`, 'error');
            });
            
            import('./src/modules/eventListeners.js').then(() => {
                debugLog('EventListeners module loaded successfully', 'success');
            }).catch(error => {
                debugLog(`EventListeners module loading failed: ${error.message}`, 'error');
            });
            
            import('./src/modules/api.js').then(() => {
                debugLog('API module loaded successfully', 'success');
            }).catch(error => {
                debugLog(`API module loading failed: ${error.message}`, 'error');
            });
            
            import('./src/modules/conversationWorkflow.js').then(() => {
                debugLog('ConversationWorkflow module loaded successfully', 'success');
            }).catch(error => {
                debugLog(`ConversationWorkflow module loading failed: ${error.message}`, 'error');
            });
            
            import('./src/modules/conversationResults.js').then(() => {
                debugLog('ConversationResults module loaded successfully', 'success');
            }).catch(error => {
                debugLog(`ConversationResults module loading failed: ${error.message}`, 'error');
            });
            
            import('./src/modules/uiUtils.js').then(() => {
                debugLog('UIUtils module loaded successfully', 'success');
            }).catch(error => {
                debugLog(`UIUtils module loading failed: ${error.message}`, 'error');
            });
            
            // Initialize app after all modules are loaded
            Promise.all([
                import('./src/modules/core.js'),
                import('./src/modules/eventListeners.js'),
                import('./src/modules/api.js'),
                import('./src/modules/conversationWorkflow.js'),
                import('./src/modules/conversationResults.js'),
                import('./src/modules/uiUtils.js')
            ]).then(() => {
                debugLog('All modules loaded, initializing app...', 'info');
                
                if (typeof IndexTTSApp !== 'undefined') {
                    debugLog('IndexTTSApp class is defined', 'success');
                    
                    try {
                        window.app = new IndexTTSApp();
                        debugLog('IndexTTSApp instance created successfully', 'success');
                        
                        // Test basic functionality
                        setTimeout(() => {
                            testAppInitialization();
                        }, 1000);
                        
                    } catch (error) {
                        debugLog(`App initialization failed: ${error.message}`, 'error');
                        debugLog(`Stack trace: ${error.stack}`, 'error');
                    }
                } else {
                    debugLog('IndexTTSApp class is not defined', 'error');
                }
            }).catch(error => {
                debugLog(`Module loading failed: ${error.message}`, 'error');
            });
            
        } catch (error) {
            debugLog(`Module loading error: ${error.message}`, 'error');
        }
    </script>
</body>
</html>
