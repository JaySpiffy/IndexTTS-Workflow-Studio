# IndexTTS2 Docker Compose Stack
# Usage: docker compose up -d

name: indexttsv2

services:
  # Backend service - FastAPI with TTS engine
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        INSTALL_DEEPSPEED: ${INDTEXTS_INSTALL_DEEPSPEED:-true}
    container_name: indexttsv2-backend
    restart: unless-stopped
    ports:
      - "${INDTEXTS_BACKEND_HOST_PORT:-8001}:8000"
    volumes:
      # Use local project data directly so Docker can run against the same
      # models and user assets you already have on disk.
      - ../shared/models:/app/shared/models
      - ../shared/audio:/app/shared/audio
      - ../shared/data:/app/shared/data
      - indextts-torch-extensions:/root/.cache/torch_extensions
      - indextts-triton-cache:/root/.triton
    environment:
      INDTEXTS_HOST: 0.0.0.0
      INDTEXTS_PORT: 8000
      INDTEXTS_USE_GPU: ${INDTEXTS_USE_GPU:-true}
      INDTEXTS_DEVICE: ${INDTEXTS_DEVICE:-auto}
      INDTEXTS_USE_FP16: ${INDTEXTS_USE_FP16:-auto}
      INDTEXTS_USE_DEEPSPEED: ${INDTEXTS_USE_DEEPSPEED:-true}
      INDTEXTS_SPEAKER_ANALYSIS_DEVICE: ${INDTEXTS_SPEAKER_ANALYSIS_DEVICE:-cpu}
      INDTEXTS_AUTO_DOWNLOAD_MODELS: ${INDTEXTS_AUTO_DOWNLOAD_MODELS:-true}
      INDTEXTS_MODEL_REPO: ${INDTEXTS_MODEL_REPO:-IndexTeam/IndexTTS-2}
      INDTEXTS_DEBUG: ${INDTEXTS_DEBUG:-false}
      HF_TOKEN: ${HF_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -q '\"model_loaded\":true'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 900s
    networks:
      - indextts-network

  # Frontend service - Nginx static file server
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: indexttsv2-frontend
    restart: unless-stopped
    ports:
      - "${INDTEXTS_FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - indextts-network

networks:
  indextts-network:
    driver: bridge

volumes:
  indextts-torch-extensions:
  indextts-triton-cache:
